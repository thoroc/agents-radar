# agents-radar configuration
# Edit this file to customize which repositories are tracked.
# Changes take effect on the next workflow run.

languages: ["en-US", "zh-CN"]

# Default language for notifications and reports when no locale is specified.
# Must be one of the enabled languages in the `languages` list above.
default_primary_language: "en-US"

# Fallback language when a string is missing in the primary language.
default_fallback_language: "en-US"

# ── Schedule configuration ─────────────────────────────────────────────────────
# Each digest type can be enabled/disabled and given a custom cron expression.
# The scheduler workflow (.github/workflows/scheduler.yml) checks these every
# hour and runs any digest whose cron matches the current time.
# NOTE: The scheduler ticks on the hour (:00), so cron minutes other than 0
#       (e.g. "30 0 * * *") will never fire. Use minute = 0 in all patterns.
# Cron format: minute hour day-of-month month day-of-week
# Examples:
#   "0 0 * * *"   = daily at 00:00 UTC
#   "0 1 * * 1"   = every Monday at 01:00 UTC
#   "0 2 1 * *"   = 1st of each month at 02:00 UTC
# Set enabled: false to disable a digest entirely.

schedules:
  daily:
    enabled: true
    cron: "0 0 * * *"
  weekly:
    enabled: true
    cron: "0 1 * * 1"
  monthly:
    enabled: true
    cron: "0 2 1 * *"

# ── AI CLI tools ──────────────────────────────────────────────────────────────
# Tracked for per-tool digests and cross-tool comparison.
# Each entry requires: id (filename slug), repo (owner/repo), name (display name).
# Set paginated: true for high-volume repos with many daily updates.

cli_repos:
  - id: claude-code
    repo: anthropics/claude-code
    name: Claude Code
  - id: codex
    repo: openai/codex
    name: OpenAI Codex
  - id: gemini-cli
