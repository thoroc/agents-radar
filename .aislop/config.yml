version: 1

engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true

quality:
  maxFunctionLoc: 80
  maxFileLoc: 500
  maxNesting: 5
  maxParams: 6

security:
  audit: true
  auditTimeout: 25000

scoring:
  weights:
    format: 0.3
    lint: 0.6
    code-quality: 0.8
    ai-slop: 2.5
    architecture: 1.0
    security: 1.5
  thresholds:
    good: 75
    ok: 50
  smoothing: 20

ci:
  failBelow: 70
  format: json

exclude:
  - "**/*.test.ts"
  - "**/*.json"
  - "**/*.jsonc"
  - "**/*.yml"
  - "**/*.yaml"
  - digests/**
  - locales/**
  - assets/**
  - mcp/**
  - coverage/**

rules:
  ai-slop/narrative-comment: warning
  ai-slop/trivial-comment: warning
  ai-slop/swallowed-exception: error
  ai-slop/hardcoded-url: warning
  security/hardcoded-secret: error
