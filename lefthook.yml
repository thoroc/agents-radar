pre-commit:
  parallel: true
  commands:
    lint:
      run: bun biome check packages mcp
    format:
      run: bun biome format packages mcp
    typecheck:
      run: bun tsc --noEmit
    markdownlint:
      glob: "README.md|AGENTS.md|CONTRIBUTING.md|docs/*.md"
      run: bun markdownlint-cli2 {staged_files}
    aislop:
      run: >
        bun x aislop scan --staged --json | bun -e
        "const d=JSON.parse(await Bun.stdin.text());
        const e=d.diagnostics.filter(x=>x.severity==='error');
        if(e.length){
          console.error('aislop: '+e.length+' critical error(s) - commit blocked');
          e.forEach(x=>console.error('  - '+x.rule+' at '+x.filePath+':'+x.line+': '+x.message));
          process.exit(1)
        }"

pre-push:
  parallel: false
  commands:
    test:
      run: bun test packages/cli packages/config packages/core packages/locales packages/providers mcp
    test-web:
      run: cd packages/web && bun run test
    validate-schema:
      run: >
        bun run validate:schema &&
        git add packages/locales/src/types/locale.ts assets/locale-schema.json &&
        git diff --cached --quiet ||
        git commit -m "chore: update auto-generated locale schema and types"
