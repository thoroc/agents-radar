name: Monthly Agents Radar

on:
  schedule:
    # 每月1日 02:00 UTC = 10:00 CST，日报运行后2小时
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run monthly rollup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DIGEST_REPO: ${{ github.repository }}
        run: bun run monthly

      - name: Commit monthly report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/
          if git diff --cached --quiet; then
            echo "No monthly report to commit"
          else
            MONTH=$(date -u +%Y-%m)
            git commit -m "digest: ${MONTH} monthly digest"
            git pull --rebase
            git push
          fi

      - name: Update web manifest
        run: bun run manifest

      - name: Commit manifest and feed
        run: |
          git add manifest.json feed.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update manifest.json"
            git pull --rebase
            git push
          fi

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || '@agents_radar' }}
          PAGES_URL: https://duanyytop.github.io/agents-radar
        run: bun run notify
